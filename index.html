<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Radio Uno Casereña 90.7 MHz - Transmisión en vivo">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Radio Uno">
    
    <title>Radio Uno Casereña 90.7 MHz</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <!-- Instalación PWA -->
    <div id="installPrompt" class="install-prompt hidden">
        <div class="install-content">
            <h3>Instalar Radio Uno</h3>
            <p>Instala la app para acceso rápido y mejor experiencia</p>
            <div class="install-buttons">
                <button id="installBtn" class="btn btn-primary">Instalar</button>
                <button id="dismissBtn" class="btn btn-secondary">Ahora no</button>
            </div>
        </div>
    </div>

    <!-- Fondo Animado -->
    <div class="animated-background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Contenedor principal -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <img src="assets/logo.png" alt="Radio Uno Casereña" class="logo">
                <div class="header-info">
                    <h1>Radio Uno</h1>
                    <p class="frequency">90.7 MHz</p>
                </div>
                <div class="header-actions" style="display: flex; align-items: center; gap: 15px;">
                    <button id="shareBtn" class="action-btn" aria-label="Compartir" style="background: none; border: none; color: white; padding: 0.5rem; display: flex; align-items: center; justify-content: center; position: relative; z-index: 9999;" onclick="
                        if(navigator.share) {
                            navigator.share({
                                title: 'Radio Uno Casereña',
                                text: '¡Escucha Radio Uno Casereña en vivo! https://radiounocasereña.com.ar'
                            }).catch(function(err){
                                if(err.name !== 'AbortError') alert('Enlace copiado al portapapeles: https://radiounocasereña.com.ar');
                            });
                        } else {
                            if(navigator.clipboard) {
                                navigator.clipboard.writeText('https://radiounocasereña.com.ar').then(function(){alert('¡Enlace copiado al portapapeles!')});
                            } else {
                                alert('Enlace para compartir: https://radiounocasereña.com.ar');
                            }
                        }
                    ">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" style="pointer-events: none;">
                            <circle cx="18" cy="5" r="3"></circle>
                            <circle cx="6" cy="12" r="3"></circle>
                            <circle cx="18" cy="19" r="3"></circle>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                        </svg>
                    </button>
                    <button id="menuBtn" class="menu-btn" aria-label="Menú">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Menú móvil -->
        <nav id="mobileMenu" class="mobile-menu hidden">
            <button id="closeMenuBtn" class="close-menu-btn" aria-label="Cerrar menú">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <button id="installMenuBtn" class="menu-item">
                <span class="icon">📱</span>
                <span>Instalar App</span>
            </button>
            <a href="https://www.facebook.com/RadioUnoCaseros?locale=es_LA" target="_blank" class="menu-item">
                <span class="icon">f</span>
                <span>Facebook</span>
            </a>
            <a href="https://www.google.com/maps/place/30%C2%B015'25.5%22S+57%C2%B037'54.2%22W/@-30.257072,-57.631718,710m/data=!3m2!1e3!4b1!4m4!3m3!8m2!3d-30.257072!4d-57.631718?entry=ttu&g_ep=EgoyMDI2MDYyOS4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="menu-item">
                <span class="icon">📍</span>
                <span>Ubicación</span>
            </a>
            <a href="https://wa.me/5493775497078" target="_blank" class="menu-item">
                <span class="icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                </span>
                <span>WhatsApp</span>
            </a>
            <button id="equalizerMenuBtn" class="menu-item">
                <span class="icon">🎚️</span>
                <span>Ecualizador</span>
            </button>
        </nav>

        <!-- Visualizador de espectro -->
        <div class="visualizer-container">
            <canvas id="visualizer" class="visualizer"></canvas>
            <div class="spectrum-bars">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <!-- Player principal -->
        <main class="player">
            <!-- Estado de conexión -->
            <div id="status" class="status">
                <span class="status-dot"></span>
                <span id="statusText">Conectando...</span>
            </div>

            <!-- Controles principales -->
            <div class="controls">
                <button id="playBtn" class="btn-play" aria-label="Reproducir">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
            </div>

            <!-- Control de volumen -->
            <div class="volume-control">
                <span class="volume-icon">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70" class="volume-slider">
                <span id="volumeValue" class="volume-value">70%</span>
            </div>

            <!-- Información de la radio -->
            <div class="radio-info">
                <h2>Radio Uno Casereña</h2>
                <p>Transmisión en vivo 24/7</p>
                <div class="now-playing-container">
                    <p id="nowPlaying" class="now-playing">🎵 Conectando con la radio...</p>
                </div>
            </div>

            <!-- Enlaces rápidos -->
            <div class="quick-links">
                <a href="https://www.facebook.com/RadioUnoCaseros?locale=es_LA" target="_blank" class="link-btn facebook" title="Facebook">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </a>
                <button id="equalizerBtn" class="link-btn equalizer" title="Ecualizador">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/>
                    </svg>
                </button>
                <a href="https://www.google.com/maps/place/30%C2%B015'25.5%22S+57%C2%B037'54.2%22W/@-30.257072,-57.631718,710m/data=!3m2!1e3!4b1!4m4!3m3!8m2!3d-30.257072!4d-57.631718?entry=ttu&g_ep=EgoyMDI2MDYyOS4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="link-btn location" title="Ubicación">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                </a>
            </div>
        </main>

        <!-- Modal Ecualizador -->
        <div id="equalizerModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Ecualizador</h2>
                    <button id="closeEqualizerBtn" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="presets">
                        <button class="preset-btn active" data-preset="flat">Plano</button>
                        <button class="preset-btn" data-preset="pop">Pop</button>
                        <button class="preset-btn" data-preset="rock">Rock</button>
                        <button class="preset-btn" data-preset="vocal">Vocal</button>
                        <button class="preset-btn" data-preset="jazz">Jazz</button>
                        <button class="preset-btn" data-preset="classical">Clásica</button>
                        <button class="preset-btn" data-preset="reggaeton">Reggaeton</button>
                    </div>
                    <div class="equalizer-sliders">
                        <div class="slider-group">
                            <label>60 Hz</label>
                            <input type="range" class="eq-slider" data-freq="60" min="-12" max="12" value="0">
                            <span class="eq-value">0</span>
                        </div>
                        <div class="slider-group">
                            <label>250 Hz</label>
                            <input type="range" class="eq-slider" data-freq="250" min="-12" max="12" value="0">
                            <span class="eq-value">0</span>
                        </div>
                        <div class="slider-group">
                            <label>1 kHz</label>
                            <input type="range" class="eq-slider" data-freq="1000" min="-12" max="12" value="0">
                            <span class="eq-value">0</span>
                        </div>
                        <div class="slider-group">
                            <label>4 kHz</label>
                            <input type="range" class="eq-slider" data-freq="4000" min="-12" max="12" value="0">
                            <span class="eq-value">0</span>
                        </div>
                        <div class="slider-group">
                            <label>16 kHz</label>
                            <input type="range" class="eq-slider" data-freq="16000" min="-12" max="12" value="0">
                            <span class="eq-value">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Footer -->
        <footer class="app-footer">
            <p>Digimedios Apps &copy; 2026</p>
        </footer>

        <!-- Botón flotante de WhatsApp -->
        <a href="https://wa.me/5493775497078" target="_blank" class="floating-whatsapp" aria-label="Contactar por WhatsApp">
            <svg viewBox="0 0 24 24" width="30" height="30" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </a>
    </div>

    <script src="src/app.js"></script>
    <script src="src/audio-visualizer.js"></script>
    <script src="src/equalizer.js"></script>
    <script src="src/pwa-installer.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                // Detectar cuando hay una nueva actualización
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        // Si hay un nuevo SW instalado y ya teníamos uno controlando la página
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('¡Nueva versión encontrada! Recargando para aplicar cambios...');
                            window.location.reload(); // Recarga automática
                        }
                    });
                });
            }).catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
